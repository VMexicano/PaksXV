<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAE0C8" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  <!-- Fondo azul marino -->
  <circle cx="50" cy="50" r="48" fill="#0d2137" />
  <!-- Anillo exterior delgado -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Letras (Monograma) -->
  <text x="50" y="62" font-family="'Times New Roman', Georgia, serif" font-size="46" font-style="italic" font-weight="normal" fill="url(#gold)" text-anchor="middle" letter-spacing="2">DY</text>
  <!-- XV pequeño abajo o arriba, opcional. O dejarlo minimalista -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#EAE0C8" text-anchor="middle" letter-spacing="4" opacity="0.8">XV</text>
</svg>
