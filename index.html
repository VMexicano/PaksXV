<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2137" />

  <!-- SEO -->
  <title>Diana Yaretzi — XV Años · 04 de Julio 2026</title>
  <meta name="description" content="Estás cordialmente invitado a celebrar los XV Años de Diana Yaretzi Hdz Pérez. 04 de Julio de 2026." />

  <!-- Open Graph (WhatsApp / redes sociales) -->
  <meta property="og:title" content="XV Años — Diana Yaretzi" />
  <meta property="og:description" content="04 de Julio de 2026 · ¡Estás invitado!" />
  <meta property="og:image" content="/og-image.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_MX" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="XV Años — Diana Yaretzi" />
  <meta name="twitter:image" content="/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- Cosmic stardust parallax background (global, all routes) -->
  <div class="cosmos" aria-hidden="true"></div>

  <!-- ===================== MUSIC FAB ===================== -->
  <button id="music-fab" class="music-fab" aria-label="Silenciar / activar música">
    <svg id="icon-music-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <svg id="icon-music-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor"/>
    </svg>
  </button>

  <!-- ===================== AUDIO ===================== -->
  <audio id="bg-music" loop preload="none">
    <source src="/src/assets/music/background.mp3" type="audio/mpeg" />
  </audio>

  <!-- ===================== MAIN APP ===================== -->
  <div id="app">
    <!-- Rendered by router.js:
         #/           → invitation view (all sections)
         #/i/{token}  → personalized invitation + RSVP
         #/subir-fotos → upload section
         #/admin*     → backoffice
    -->
  </div>

  <!-- ===================== TOAST ===================== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
