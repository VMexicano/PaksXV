<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2137" />

  <!-- SEO -->
  <title>Diana Yaretzi — XV Años · 04 de Julio 2026</title>
  <meta name="description" content="Estás cordialmente invitado a celebrar los XV Años de Diana Yaretzi Hdz Pérez. 04 de Julio de 2026." />

  <!-- Open Graph (WhatsApp / redes sociales) -->
  <meta property="og:title" content="XV Años — Diana Yaretzi" />
  <meta property="og:description" content="04 de Julio de 2026 · ¡Estás invitado!" />
  <meta property="og:image" content="/og-image.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_MX" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="XV Años — Diana Yaretzi" />
  <meta name="twitter:image" content="/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ===================== MUSIC GATE OVERLAY ===================== -->
  <div id="music-overlay" class="music-overlay" role="button" aria-label="Entrar a la invitación">
    <div class="music-overlay__content fade-in">
      <div class="music-overlay__seal float">
        <!-- Seal SVG placeholder — replaced with envelope image asset -->
        <svg viewBox="0 0 120 120" width="120" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="58" stroke="#c0c0c0" stroke-width="1.5" stroke-dasharray="4 4"/>
          <circle cx="60" cy="60" r="44" stroke="#c0c0c0" stroke-width="0.8"/>
          <text x="60" y="55" text-anchor="middle" font-family="Playfair Display,serif" font-size="11" fill="#c0c0c0" letter-spacing="3">DIANA</text>
          <text x="60" y="72" text-anchor="middle" font-family="Playfair Display,serif" font-size="9" fill="#c0c0c0" letter-spacing="2">YARETZI</text>
          <text x="60" y="86" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#8a8a8a" letter-spacing="4">XV AÑOS</text>
        </svg>
      </div>
      <p class="music-overlay__text shimmer">Toca para entrar</p>
      <div class="music-overlay__note">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <span>Con música de fondo</span>
      </div>
    </div>
  </div>

  <!-- ===================== MUSIC FAB ===================== -->
  <button id="music-fab" class="music-fab" aria-label="Silenciar / activar música" hidden>
    <svg id="icon-music-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <svg id="icon-music-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke="#8a8a8a"/>
    </svg>
  </button>

  <!-- ===================== AUDIO ===================== -->
  <audio id="bg-music" loop preload="none">
    <source src="/src/assets/music/background.mp3" type="audio/mpeg" />
  </audio>

  <!-- ===================== MAIN APP ===================== -->
  <div id="app">
    <!-- Rendered by router.js:
         #/           → invitation view (all sections)
         #/i/{token}  → personalized invitation + RSVP
         #/subir-fotos → upload section
         #/admin*     → backoffice
    -->
  </div>

  <!-- ===================== TOAST ===================== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
